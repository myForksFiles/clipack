name: tests

on:
  push:
    branches:
      - dev
      - master
      - main
      - 'upgrade/**'

  pull_request:
    branches:
      - dev
      - master
      - main

  schedule:
    - cron: '0 6 1 * *'

  workflow_dispatch:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tests:
    name: PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        php-version:
          - '8.3'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          tools: composer:v2
          extensions: mbstring, xml, ctype, json, tokenizer, fileinfo, dom, filter

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php-version }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php-version }}-composer-

      - name: Validate composer.json
        run: composer validate --strict --no-check-publish

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --no-scripts

      - name: Prepare runtime directories
        run: mkdir -p storage/phpstan storage/logs storage/framework/{cache,sessions,views,testing}

      - name: Dump autoload
        run: composer dump-autoload --optimize --strict-psr

      - name: Run tests
        run: composer test

      - name: Run static analysis
        run: composer analyse

      - name: Run Rector dry-run
        run: composer rector:test

      - name: Check code style
        run: composer format:test
